<section class="relative w-full h-screen overflow-hidden">

  <!-- Slides container -->
  <div #slidesContainer class="flex h-full w-full">
    <img
      *ngFor="let image of images"
      [src]="isMobile ? image.mobile : image.desktop"
      class="w-full h-full object-cover flex-shrink-0"
      alt="Slide image"
    />
  </div>

  <!-- "Shop Now" -->
  <a
    [routerLink]="['/allProducts']"
    class="shop-now-btn absolute bottom-20 text-3xl left-1/2 -translate-x-1/2 text-white font-semibold hover:scale-110 transition-transform"
  >
    SHOP NOW
  </a>

  <!-- Dots -->
  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex space-x-2">
   <span
  *ngFor="let image of images; let i = index"
  (click)="goToSlide(i)"
  [class.active]="currentSlide === i"
  class="dot"
></span>

  </div>
</section>
