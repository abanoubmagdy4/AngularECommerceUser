<header
  [ngClass]="{
    'relative  absolute w-screen end-0 top-0 z-10': isHome,
     'relative  bg-transparent border-b border-neutral-400': !isHome,
}"
  class="font-bold transition-all ease duration-700"
>
  <div class="mx-auto max-w-screen-xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between">
      <!-- Hamburger Menu - يظهر في كل الشاشات -->
      <div>
        <button
          (click)="toggleMobileMenu()"
          [ngClass]="{'text-white': isHome}"
          class="p-2 text-black transition hover:scale-120"
        >
          <svg
            class="size-7"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        </button>
      </div>

      <!-- Logo في المنتصف -->
      <div class="flex-1 flex justify-center">
        <a
          [ngClass]="{'text-white': isHome}"
          class="block text-black group"
          [routerLink]="['/home']"
        >
          <span class="sr-only">Home</span>
          <img
            [src]="isHome ? 'assets/logo $/LOGO.png' : 'assets/logo $/loogoooo.png'"
            alt="Logo"
            class="h-8 transform transition-transform duration-300 group-hover:scale-120"
          />
        </a>
      </div>

      <!-- الأيكونات جنب بعض على اليمين -->
      <div class="flex items-center gap-4">
        <!-- User Icon -->
        <div (click)="toggleProfile()" class="cursor-pointer">
          <i
            [ngClass]="{ 'text-white': isHome }"
            class="fa-solid fa-user text-xl transition duration-300 hover:scale-130"
          ></i>
        </div>

        <!-- Cart Icon -->
        <div (click)="toggleCart()" class="relative cursor-pointer">
          <i
            [ngClass]="{ 'text-white': isHome }"
            class="fa-solid fa-bag-shopping text-xl transition duration-300 hover:scale-130"
          ></i>

          <span
            *ngIf="cartCount > 0"
            style="color: #414040"
            class="absolute -top-2 -right-2 bg-gray-400 text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center"
          >
            {{ cartCount }}
          </span>
        </div>

        <!-- Cart component appears dynamically -->
        <app-cart *ngIf="isCartVisible" (close)="toggleCart()"></app-cart>
      </div>
    </div>

    <!-- القائمة المنسدلة من فوق - شفافة مع خط أبيض -->
    <div
      *ngIf="isMobileMenuVisible"
      class="absolute left-0 right-0 top-full bg-transparent z-20 animate-slideDown"
    >
      <div class="max-w-screen-xl mx-auto px-4 py-6">
        <nav
          class="flex flex-col text-align: center space-y-7 md:space-x-8 md:justify-center"
        >
          <a
            [routerLink]="['/allProducts']"
            (click)="closeMobileMenu()"
            [ngClass]="{
    'text-white hover:text-gray-300': isHome,
    'text-black hover:text-gray-600': !isHome
  }"
            class="transition-colors font-medium text-lg md:text-base"
          >
            Catalog
          </a>
          <a
            [routerLink]="['/contact-us']"
            (click)="closeMobileMenu()"
            [ngClass]="{
    'text-white hover:text-gray-300': isHome,
    'text-black hover:text-gray-600': !isHome
  }"
            class="transition-colors font-medium text-lg md:text-base"
          >
            Contact
          </a>
          <a
            [routerLink]="['/policy']"
            (click)="closeMobileMenu()"
            [ngClass]="{
    'text-white hover:text-gray-300': isHome,
    'text-black hover:text-gray-600': !isHome
  }"
            class="transition-colors font-medium text-lg md:text-base"
          >
            Policy
          </a>
        </nav>
      </div>
    </div>
  </div>

  <!-- Profile Dropdown -->
  <div *ngIf="isProfileVisible" class="relative">
    <div
      class="absolute end-10 z-10 mt-3 w-80 px-5 py-3 divide-y divide-gray-100 rounded-md border border-gray-100 bg-white shadow-xl"
      role="menu"
    >
      <h3 class="font-bold mb-2">Account</h3>

      <div class="p-2 flex flex-col gap-5">
        <!-- إذا لم يكن مسجل دخول -->
        @if(isLoggedIn == false){
        <div class="text-center">
          <button
            (click)="openLoginDialog()"
            class="block w-full rounded bg-black text-white py-2 text-sm font-medium hover:bg-transparent hover:text-black border border-transparent hover:border-black transition"
          >
            Sign in
          </button>
        </div>
        }@else{
        <div class="grid justify-items-center sm:grid-cols-2 gap-2">
          <a
            [routerLink]="['/previous-orders']"
            class="block rounded-sm px-6 py-2 text-sm border border-neutral-500 text-black"
          >
            <i class="fa-solid fa-box me-1"></i> Orders
          </a>

          <a
            [routerLink]="['/profile']"
            class="block rounded-sm px-6 py-2 text-sm border border-neutral-500 text-black"
          >
            <i class="fa-solid fa-user me-1"></i> Profile
          </a>
        </div>

        <!-- LogOut -->
        <div class="pt-4" (click)="logout()">
          <button
            type="button"
            class="flex w-full items-center gap-2 rounded-lg px-4 py-2 text-sm text-red-700"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-4"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3"
              />
            </svg>
            Logout
          </button>
        </div>
        }
      </div>
    </div>
  </div>
</header>

<!-- CSS للأنيميشن -->
<style>
  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-20px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .animate-slideDown {
    animation: slideDown 0.3s ease-out;
  }
</style>
