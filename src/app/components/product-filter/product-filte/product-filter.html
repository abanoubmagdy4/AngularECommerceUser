<!-- Desktop Sidebar -->
<!-- Desktop Sidebar -->

<div
  class="hidden lg:block left-0 h-full w-64 bg-white rounded shadow-lg p-4 z-40"
>
  <!-- Search -->
  <div class="mb-6">
    <input
      type="text"
      placeholder="Search..."
      [(ngModel)]="searchTerm"
      (keyup.enter)="emitFilters()"
      class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
  </div>

  <!-- Price Range -->
  <div class="mb-6">
    <label class="block font-bold mb-2 text-gray-700">Price Range</label>
    <div class="relative w-full h-2 bg-gray-200 rounded-full">
      <div
        class="absolute h-2 bg-blue-500 rounded-full"
        [style.left.%]="(minPrice / maxRange) * 100"
        [style.right.%]="100 - (maxPrice / maxRange) * 100"
      ></div>
    </div>

    <input
      type="range"
      [min]="minRange"
      [max]="maxRange"
      [(ngModel)]="minPrice"
      (input)="updateRange('min')"
      class="absolute top-68 w-56 h-2 bg-transparent appearance-none"
    />

    <input
      type="range"
      [min]="minRange"
      [max]="maxRange"
      [(ngModel)]="maxPrice"
      (input)="updateRange('max')"
      class="absolute top-68 w-56 h-2 bg-transparent appearance-none pointer-events-auto"
    />
    <div class="flex justify-between text-sm mt-8">
      <span>Min: {{ minPrice }}</span>
      <span>Max: {{ maxPrice }}</span>
    </div>
  </div>

  <!-- Categories -->
  <div *ngFor="let cat of categories" class="mb-4 py-3">
    <div
      class="flex justify-between items-center cursor-pointer font-semibold text-gray-800 hover:text-blue-600 transition"
      (click)="toggleCategory(cat)"
      (click)="selectCategory(cat.id)"
    >
      <span>{{cat.name}}</span>
      <span>{{cat.open ? '-' : '+'}}</span>
    </div>

    <ul *ngIf="cat.open" class="ml-4 mt-2 border-l pl-2 space-y-1">
      <li
        (click)="selectCategory(cat.id)"
        class="cursor-pointer hover:text-blue-500 transition"
      >
        All {{cat.name}}
      </li>
      <li
        *ngFor="let sub of ProductTypes"
        (click)="selectSubCategory(sub, cat.id)"
        class="cursor-pointer flex items-center gap-2 hover:text-blue-500 transition"
      >
        <input type="radio" [checked]="selectedSubCategory === sub" />
        {{sub}}
      </li>
    </ul>
  </div>

  <!-- All Products Button -->
  <button
    class="mt-6 bg-gray-800 hover:bg-black text-white px-4 py-2 w-full rounded-lg shadow-md transition"
    (click)="resetFilters()"
  >
    All Products
  </button>
</div>

<!-- Mobile Filter Button -->
<div class="lg:hidden p-2 flex justify-between items-center">
  <button (click)="showMobileFilter = true" class="text-3xl">
    <i class="fas fa-filter"></i>
  </button>
</div>

<!-- Mobile Filter Offcanvas -->
<div
  class="fixed inset-0 bg-black bg-opacity-50 z-50 transition-opacity duration-300"
  *ngIf="showMobileFilter"
  (click)="closeFilter($event)"
>
  <div
    class="absolute right-0 w-72 bg-white h-full p-4 overflow-y-auto transform transition-transform duration-300"
  >
    <button class="mb-4 text-lg font-bold" (click)="showMobileFilter = false">
      ✕ Close
    </button>

    <!-- Search Button + Input -->
    <div class="mb-4">
      <button
        class="w-full bg-gray-200 py-2 rounded mb-2"
        (click)="toggleSearchInput()"
      >
        <i class="fas fa-search"></i>
      </button>
      <input
        *ngIf="showSearchInput"
        type="text"
        [(ngModel)]="searchTerm"
        (keyup.enter)="emitFilters()"
        placeholder="Search products..."
        class="w-full p-2 border rounded"
      />
    </div>

    <!-- Price Range -->
    <div class="mb-4">
      <label class="block font-bold mb-2">Price Range</label>
      <div class="relative w-full h-2 bg-gray-200 rounded-full">
        <div
          class="absolute h-2 bg-blue-500 rounded-full"
          [style.left.%]="(minPrice / maxRange) * 100"
          [style.right.%]="100 - (maxPrice / maxRange) * 100"
        ></div>
      </div>

      <input
        type="range"
        [min]="minRange"
        [max]="maxRange"
        [(ngModel)]="minPrice"
        (input)="updateRange('min')"
        class="absolute w-64 h-2 bg-transparent appearance-none pointer-events-auto"
      />

      <input
        type="range"
        [min]="minRange"
        [max]="maxRange"
        [(ngModel)]="maxPrice"
        (input)="updateRange('max')"
        class="absolute w-64 h-2 bg-transparent appearance-none pointer-events-auto"
      />

      <div class="flex justify-between text-sm mt-8">
        <span>Min: {{ minPrice }}</span>
        <span>Max: {{ maxPrice }}</span>
      </div>

      <!-- Categories -->
      <ul class="space-y-2 py-4">
        <li *ngFor="let cat of categories">
          <div
            class="flex justify-between items-center cursor-pointer font-semibold"
            (click)="toggleCategory(cat)"
            (click)="selectCategory(cat.id)"
          >
            {{cat.name}}
            <span>{{cat.open ? '-' : '+'}}</span>
          </div>
          <ul *ngIf="cat.open" class="ml-4 mt-2 border-l pl-2 space-y-1">
            <li (click)="selectCategory(cat.id)" class="cursor-pointer">
              All {{cat.name}}
            </li>
            <li
              *ngFor="let sub of ProductTypes"
              (click)="selectSubCategory(sub, cat.id)"
              class="cursor-pointer flex items-center gap-2 hover:text-blue-500 transition"
            >
              <input type="radio" [checked]="selectedSubCategory === sub" />
              {{sub}}
            </li>
          </ul>
        </li>
      </ul>

      <button
        class="mt-4 bg-gray-200 px-4 py-2 w-full rounded"
        (click)="resetFilters()"
      >
        All Products
      </button>
    </div>
  </div>
</div>
