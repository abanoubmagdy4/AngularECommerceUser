<section class="flex flex-col-reverse lg:flex-row items-center justify-center gap-10 px-6 py-12 text-dark min-h-screen">
  <!-- ✅ اليسار في الديسكتوب - المحتوى -->
  <div class="w-full lg:w-1/2 flex flex-col gap-8">
    <!-- ✅ البحث بالصورة -->
    <div class="">
      <h2 class="text-3xl font-bold mb-4 text-black">{{ 'SEARCH_BY_IMAGE.SMART_TITLE' | translate }}</h2>
      <p class="mb-6 leading-relaxed text-black">
        {{ 'SEARCH_BY_IMAGE.SMART_DESCRIPTION' | translate }}
      </p>

      <div class="relative">
        <input #fileInput type="file" accept="image/*" (change)="handleFileSelect($event)" class="hidden" />
        <button type="button" (click)="fileInput.click()"
          class="flex justify-center gap-2 mx-auto w-40 py-3 px-4 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition font-medium text-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 12V4m0 0L8 8m4-4l4 4" />
          </svg>
          {{ loading ? ('SEARCH_BY_IMAGE.UPLOAD_SEARCHING' | translate) : ('SEARCH_BY_IMAGE.UPLOAD_BTN' | translate) }}
        </button>
      </div>
    </div>

    <!-- ✅ البحث بالنص -->
    <div class="">
      <h3 class="text-3xl font-bold mb-4 text-black">{{ 'SEARCH_BY_IMAGE.TEXT_TITLE' | translate }}</h3>
      <p class="mb-6 leading-relaxed text-black">
        {{ 'SEARCH_BY_IMAGE.TEXT_DESCRIPTION' | translate }}
      </p>

      <div class="flex flex-col sm:flex-row items-center gap-3">
        <input [(ngModel)]="promptText" name="promptText" type="text"
          [placeholder]="'SEARCH_BY_IMAGE.TEXT_PLACEHOLDER' | translate"
          class="flex-1 px-4 py-3 rounded-full border border-gray-300 text-sm placeholder-gray-500 focus:ring-blue-500 focus:border-blue-500 w-full" />

        <button type="button" (click)="onSearchByPrompt()" [disabled]="!promptText || loadingPrompt"
          class="py-3 px-6 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition disabled:opacity-50 text-sm font-medium w-full sm:w-auto">
          {{ loadingPrompt ? ('SEARCH_BY_IMAGE.TEXT_SEARCHING' | translate) : ('SEARCH_BY_IMAGE.TEXT_BTN' | translate)
          }}
        </button>
      </div>
    </div>
  </div>

  <!-- ✅ الصورة (ستظهر أعلى في الموبايل ويمين في الديسكتوب) -->
  <div class="w-full lg:w-1/2 flex justify-center mb-10 lg:mb-0">
    <img src="assets/images/77ed52cf-7112-4434-a3df-f54b2828c977.png" alt="AI Search"
      class="max-w-sm w-full h-auto object-contain" />
  </div>
</section>
